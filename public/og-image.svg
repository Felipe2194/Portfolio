<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(201,100%,13%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(210,80%,8%);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Top thin border line -->
  <rect x="80" y="60" width="1040" height="1" fill="rgba(255,255,255,0.12)" />
  <!-- Bottom thin border line -->
  <rect x="80" y="569" width="1040" height="1" fill="rgba(255,255,255,0.12)" />

  <!-- Logo -->
  <text
    x="600" y="290"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="96"
    font-weight="400"
    text-anchor="middle"
    fill="white"
    letter-spacing="-3"
  >Velorah®</text>

  <!-- Tagline -->
  <text
    x="600" y="365"
    font-family="Arial, Helvetica, sans-serif"
    font-size="22"
    font-weight="400"
    text-anchor="middle"
    fill="rgba(255,255,255,0.45)"
    letter-spacing="2"
  >Where dreams rise through the silence.</text>

  <!-- Bottom label -->
  <text
    x="600" y="530"
    font-family="Arial, Helvetica, sans-serif"
    font-size="13"
    font-weight="400"
    text-anchor="middle"
    fill="rgba(255,255,255,0.2)"
    letter-spacing="4"
  >PORTFOLIO · 2026</text>
</svg>
